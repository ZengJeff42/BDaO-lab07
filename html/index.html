<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab7 Automated Deployment Experiment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .card {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.05);
            padding: 2.5rem 2rem;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.25);
        }

        /* 头像样式 */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        .avatar:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f6e43, #2b9b5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.25rem;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 500;
            color: #1e293b;
            background: #f8fafc;
            display: inline-block;
            padding: 0.4rem 1.2rem;
            margin: 0.75rem 0;
            border-radius: 60px;
            box-shadow: inset 0 1px 2px #ffffff80, 0 2px 4px rgba(0, 0, 0, 0.02);
            letter-spacing: -0.2px;
        }

        h2:last-of-type {
            background: #f1f5f9;
        }

        p {
            font-size: 1.2rem;
            color: #334155;
            background: #ffffffcc;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            margin-top: 1rem;
            border: 1px solid #e2e8f0;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 550px) {
            .card {
                padding: 1.8rem 1.2rem;
            }
            h1 {
                font-size: 1.7rem;
            }
            h2 {
                font-size: 1.3rem;
                padding: 0.3rem 1rem;
            }
            p {
                font-size: 1rem;
            }
            .avatar {
                width: 80px;
                height: 80px;
            }
        }

        .card::before {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #2b9b5c, #cbd5e1);
            margin: 0 auto 1.2rem auto;
            border-radius: 3px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="avatar" src="Jeff.jpg" alt="Personal Avatar">
        <h1>✅ GitHub Actions Automated Deployment Successful</h1>
        <h2>Name: zengjifu</h2>
        <h2>Student ID: 20242180</h2>
        <p>🔧 Development environment</p>
        <p>Deployment time: May 26, 2026</p>
    </div>
</body>
</html>
